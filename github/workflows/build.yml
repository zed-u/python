name: Build Python EXE

on:
  push:
    branches: [ "main" ] # سيعمل الأكشن عند الرفع على فرع main
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest # ضروري لبناء ملف exe يعمل على ويندوز

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # حدد إصدار بايثون المناسب لك

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build EXE with PyInstaller
      run: |
        # استبدل main.py باسم ملفك الأساسي
        # --onefile لجعل البرنامج ملف واحد فقط
        # --noconsole إذا كنت لا تريد ظهور شاشة سوداء عند تشغيل البرنامج
        pyinstaller --onefile --noconsole main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyExecutableApp
        path: dist/main.exe
